name: natmod

on:
  pull_request:
    paths:
      - "micropython-natmod/**"
      - "tiny_bclibc/**"
      - ".github/workflows/natmod.yml"

env:
  MPY_VERSION: v1.28.0
  MPY_TARBALL: https://github.com/micropython/micropython/releases/download/v1.28.0/micropython-1.28.0.tar.xz
  MPY_DIR: ${{ github.workspace }}/micropython-1.28.0

jobs:
  # ── Build all architectures + precisions in parallel ───────────────────────
  build:
    name: build (${{ matrix.arch }}${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Single precision (float) — default for all MCU archs ─────────
          - {arch: x64,       use_float: 1, suffix: ""}
          - {arch: x86,       use_float: 1, suffix: "",   apt: gcc-multilib}
          - {arch: armv6m,    use_float: 1, suffix: "",   apt: gcc-arm-none-eabi libnewlib-arm-none-eabi}
          - {arch: armv7m,    use_float: 1, suffix: "",   apt: gcc-arm-none-eabi libnewlib-arm-none-eabi}
          - {arch: armv7emsp, use_float: 1, suffix: "",   apt: gcc-arm-none-eabi libnewlib-arm-none-eabi}
          - {arch: armv7emdp, use_float: 1, suffix: "",   apt: gcc-arm-none-eabi libnewlib-arm-none-eabi}
          - {arch: rv32imc,   use_float: 1, suffix: "",   apt: gcc-riscv64-unknown-elf picolibc-riscv64-unknown-elf}
          - {arch: rv64imc,   use_float: 1, suffix: "",   apt: gcc-riscv64-unknown-elf picolibc-riscv64-unknown-elf}
          # ── Double precision — host (x64/x86) and armv7emdp (hw double FPU)
          - {arch: x64,       use_float: 0, suffix: "_d"}
          - {arch: x86,       use_float: 0, suffix: "_d", apt: gcc-multilib}
          - {arch: armv7emdp, use_float: 0, suffix: "_d", apt: gcc-arm-none-eabi libnewlib-arm-none-eabi}

    steps:
      - uses: actions/checkout@v6

      - name: Fetch MicroPython ${{ env.MPY_VERSION }}
        run: wget -q "$MPY_TARBALL" -O mpy.tar.xz && tar xf mpy.tar.xz && rm mpy.tar.xz

      - name: Install cross-compiler
        if: matrix.apt != ''
        run: sudo apt-get install -y ${{ matrix.apt }}

      - name: Install Python tools
        run: pip install pyelftools ar

      - name: Build tiny_bclibc_${{ matrix.arch }}${{ matrix.suffix }}.mpy
        working-directory: micropython-natmod
        run: make ARCH=${{ matrix.arch }} USE_FLOAT=${{ matrix.use_float }} MPY_DIR=${{ env.MPY_DIR }}

      - uses: actions/upload-artifact@v7
        with:
          name: tiny-bclibc-${{ matrix.arch }}${{ matrix.suffix }}
          path: micropython-natmod/tiny_bclibc_${{ matrix.arch }}${{ matrix.suffix }}.mpy
          if-no-files-found: error

  # ── Test on x64 host — both float and double variants ─────────────────────
  test-x64:
    name: test (x64${{ matrix.suffix }} / micropython)
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {suffix: "",   use_float: 1}
          - {suffix: "_d", use_float: 0}
    steps:
      - uses: actions/checkout@v6

      - name: Fetch MicroPython ${{ env.MPY_VERSION }}
        run: wget -q "$MPY_TARBALL" -O mpy.tar.xz && tar xf mpy.tar.xz && rm mpy.tar.xz

      - name: Install micropython unix build deps
        run: sudo apt-get install -y libffi-dev pkg-config

      - name: Build micropython unix/standard (matches natmod .mpy version)
        run: make -C "$MPY_DIR/ports/unix" VARIANT=standard

      - uses: actions/download-artifact@v8
        with:
          name: tiny-bclibc-x64${{ matrix.suffix }}
          path: micropython-natmod/

      - name: Symlink to tiny_bclibc.mpy
        working-directory: micropython-natmod
        run: ln -sf tiny_bclibc_x64${{ matrix.suffix }}.mpy tiny_bclibc.mpy

      - name: Run tests
        working-directory: micropython-natmod
        run: "$MPY_DIR/ports/unix/build-standard/micropython test_bclibc.py"

  # ── Test on x86 host — both float and double variants ─────────────────────
  test-x86:
    name: test (x86${{ matrix.suffix }} / micropython 32-bit)
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {suffix: "",   use_float: 1}
          - {suffix: "_d", use_float: 0}
    steps:
      - uses: actions/checkout@v6

      - name: Fetch MicroPython ${{ env.MPY_VERSION }}
        run: wget -q "$MPY_TARBALL" -O mpy.tar.xz && tar xf mpy.tar.xz && rm mpy.tar.xz

      - name: Install 32-bit build deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -q
          sudo apt-get install -y gcc-multilib libffi-dev:i386 pkg-config

      - name: Build micropython unix/standard 32-bit
        run: make -C "$MPY_DIR/ports/unix" VARIANT=standard MICROPY_FORCE_32BIT=1

      - uses: actions/download-artifact@v8
        with:
          name: tiny-bclibc-x86${{ matrix.suffix }}
          path: micropython-natmod/

      - name: Symlink to tiny_bclibc.mpy
        working-directory: micropython-natmod
        run: ln -sf tiny_bclibc_x86${{ matrix.suffix }}.mpy tiny_bclibc.mpy

      - name: Run tests
        working-directory: micropython-natmod
        run: "$MPY_DIR/ports/unix/build-standard/micropython test_bclibc.py"

  # ── Test on emulated Cortex-M3 via QEMU (armv7m, single precision) ────────
  test-qemu-arm:
    name: test (armv7m / QEMU Cortex-M3)
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch MicroPython ${{ env.MPY_VERSION }}
        run: wget -q "$MPY_TARBALL" -O mpy.tar.xz && tar xf mpy.tar.xz && rm mpy.tar.xz

      - name: Install toolchain + QEMU
        run: |
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi qemu-system-arm
          pip install pyelftools ar pyserial

      - name: Build mpy-cross
        run: make -C "$MPY_DIR/mpy-cross"

      - name: Build MicroPython QEMU firmware (MPS2_AN385 / Cortex-M3)
        run: make -C "$MPY_DIR/ports/qemu" BOARD=MPS2_AN385

      - uses: actions/download-artifact@v8
        with:
          name: tiny-bclibc-armv7m
          path: micropython-natmod/

      - name: Symlink to tiny_bclibc.mpy
        working-directory: micropython-natmod
        run: ln -sf tiny_bclibc_armv7m.mpy tiny_bclibc.mpy

      - name: Run tests via QEMU
        run: |
          python3 micropython-natmod/ci/run_qemu.py \
            "$MPY_DIR/ports/qemu/build-MPS2_AN385/firmware.elf" \
            micropython-natmod/

  # ── Test on emulated Cortex-M0 via QEMU (armv6m / nRF51 MICROBIT) ────────
  test-qemu-arm6m:
    name: test (armv6m / QEMU Cortex-M0)
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch MicroPython ${{ env.MPY_VERSION }}
        run: wget -q "$MPY_TARBALL" -O mpy.tar.xz && tar xf mpy.tar.xz && rm mpy.tar.xz

      - name: Install toolchain + QEMU
        run: |
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi qemu-system-arm
          pip install pyelftools ar pyserial

      - name: Build mpy-cross
        run: make -C "$MPY_DIR/mpy-cross"

      - name: Build MicroPython QEMU firmware (MICROBIT / Cortex-M0)
        run: make -C "$MPY_DIR/ports/qemu" BOARD=MICROBIT

      - uses: actions/download-artifact@v8
        with:
          name: tiny-bclibc-armv6m
          path: micropython-natmod/

      - name: Symlink to tiny_bclibc.mpy
        working-directory: micropython-natmod
        run: ln -sf tiny_bclibc_armv6m.mpy tiny_bclibc.mpy

      - name: Run tests via QEMU
        run: |
          python3 micropython-natmod/ci/run_qemu.py \
            "$MPY_DIR/ports/qemu/build-MICROBIT/firmware.elf" \
            micropython-natmod/ \
            --machine microbit \
            --qemu-extra "-global nrf51-soc.flash-size=1048576 -global nrf51-soc.sram-size=262144"
