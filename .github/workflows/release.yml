name: Release on Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup build matrix
        id: setup_matrix
        run: |
          echo "matrix={\"platform\":[\"ubuntu-latest\",\"macos-latest\",\"windows-latest\"]}" >> $GITHUB_OUTPUT

      - name: Build Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          cd ..
          mkdir -p artifacts/linux
          cp build/libbclibc_ffi.so artifacts/linux/
          cp build/libbclibc_core.a artifacts/linux/

      - name: Build macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(sysctl -n hw.ncpu)
          cd ..
          mkdir -p artifacts/macos
          cp build/libbclibc_ffi.dylib artifacts/macos/
          cp build/libbclibc_core.a artifacts/macos/

      - name: Build Windows
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Path build -Force
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release
          cd ..
          New-Item -ItemType Directory -Path artifacts/windows -Force
          Copy-Item "build/bin/Release/bclibc_ffi.dll" "artifacts/windows/"
          Copy-Item "build/lib/Release/bclibc_core.lib" "artifacts/windows/"

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
          generate_release_notes: true
