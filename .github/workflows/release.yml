name: Release on Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            arch: x86_64
          - os: ubuntu-24.04-arm
            platform: Linux
            arch: arm64
          - os: macos-latest
            platform: macOS
            arch: universal
          - os: windows-latest
            platform: Windows
            arch: x86_64
          - os: windows-latest
            platform: Windows
            arch: arm64
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Configure CMake
        shell: bash
        run: |
          mkdir -p build
          cd build
          if [[ "${{ matrix.platform }}" == "macOS" ]]; then
            cmake -DCMAKE_BUILD_TYPE=Release "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64" ..
          elif [[ "${{ matrix.platform }}" == "Windows" && "${{ matrix.arch }}" == "arm64" ]]; then
            cmake -G "Visual Studio 17 2022" -A ARM64 -DCMAKE_BUILD_TYPE=Release ..
          elif [[ "${{ matrix.platform }}" == "Windows" ]]; then
            cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release ..
          else
            cmake -DCMAKE_BUILD_TYPE=Release ..
          fi

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd build
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            make -j$(sysctl -n hw.ncpu)
          else
            make -j$(nproc)
          fi

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd build
          cmake --build . --config Release

      - name: Prepare artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ARTIFACT_DIR="artifacts/${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "$ARTIFACT_DIR"
          cd build
          if [[ "${{ matrix.platform }}" == "Linux" ]]; then
            cp libbclibc_ffi.so "../$ARTIFACT_DIR/"
          elif [[ "${{ matrix.platform }}" == "macOS" ]]; then
            cp libbclibc_ffi.dylib "../$ARTIFACT_DIR/"
          fi
          cp lib/libbclibc_core.a "../$ARTIFACT_DIR/"
          cp generated/bclibc/version.h "../$ARTIFACT_DIR/"

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactDir = "artifacts/${{ matrix.platform }}-${{ matrix.arch }}"
          New-Item -ItemType Directory -Path $artifactDir -Force

          # Copy DLL
          $dllPath = "build/bin/Release/bclibc_ffi.dll"
          if (Test-Path $dllPath) {
            Copy-Item $dllPath "$artifactDir/"
          } else {
            $foundDll = Get-ChildItem -Path build -Recurse -Filter "bclibc_ffi.dll" | Select-Object -First 1
            if ($foundDll) { Copy-Item $foundDll.FullName "$artifactDir/" }
            else { Write-Error "bclibc_ffi.dll not found"; exit 1 }
          }

          # Copy static LIB
          Copy-Item "build/lib/Release/bclibc_core.lib" "$artifactDir/"

          Copy-Item "build/generated/bclibc/version.h" "$artifactDir/"

      - name: Upload artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
          generate_release_notes: true
