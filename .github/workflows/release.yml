name: Release on Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    uses: ./.github/workflows/build-lib.yml
    with:
      os: ubuntu-latest
      arch: x86_64
      retention_days: 1

  build-linux-arm64:
    uses: ./.github/workflows/build-lib.yml
    with:
      os: ubuntu-24.04-arm
      arch: arm64
      retention_days: 1

  build-macos:
    uses: ./.github/workflows/build-lib.yml
    with:
      os: macos-latest
      arch: universal
      retention_days: 1

  build-windows-x86_64:
    uses: ./.github/workflows/build-lib.yml
    with:
      os: windows-latest
      arch: x86_64
      retention_days: 1

  build-windows-arm64:
    uses: ./.github/workflows/build-lib.yml
    with:
      os: windows-latest
      arch: arm64
      retention_days: 1

  release:
    name: Create Release
    needs:
      - build-linux-x86_64
      - build-linux-arm64
      - build-macos
      - build-windows-x86_64
      - build-windows-arm64
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Delete existing release if present
        run: gh release delete ${{ github.ref_name }} --yes || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package artifacts into zips
        run: |
          mkdir -p release-files
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            zip -j "release-files/${name}.zip" "$dir"*
          done

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: release-files/*.zip
          generate_release_notes: true
