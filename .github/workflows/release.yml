name: Release on Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    uses: ./.github/workflows/build-lib.yml
    with:
      os: ubuntu-latest
      arch: x86_64
      retention_days: 1

  build-linux-arm64:
    uses: ./.github/workflows/build-lib.yml
    with:
      os: ubuntu-24.04-arm
      arch: arm64
      retention_days: 1

  build-macos:
    uses: ./.github/workflows/build-lib.yml
    with:
      os: macos-latest
      arch: universal
      retention_days: 1

  build-windows-x86_64:
    uses: ./.github/workflows/build-lib.yml
    with:
      os: windows-latest
      arch: x86_64
      retention_days: 1

  build-windows-arm64:
    uses: ./.github/workflows/build-lib.yml
    with:
      os: windows-latest
      arch: arm64
      retention_days: 1

  update-flatpak-module:
    name: Update Flatpak Module
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update bclibc.json
        run: |
          TAG=${{ github.ref_name }}
          COMMIT=${{ github.sha }}
          jq --arg tag "$TAG" --arg commit "$COMMIT" \
            '(.sources[] | select(.type == "git")) |= (.tag = $tag | .commit = $commit)' \
            bclibc.json > bclibc.json.tmp && mv bclibc.json.tmp bclibc.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bclibc.json
          git diff --staged --quiet || git commit -m "chore: update Flatpak module to ${{ github.ref_name }} [skip ci]"
          git push

  release:
    name: Create Release
    needs:
      - build-linux-x86_64
      - build-linux-arm64
      - build-macos
      - build-windows-x86_64
      - build-windows-arm64
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete existing release if present
        run: gh release delete ${{ github.ref_name }} --yes || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md | sed '/^[[:space:]]*$/d' | head -50)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Package artifacts into zips
        run: |
          mkdir -p release-files
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            zip -j "release-files/${name}.zip" "$dir"*
          done

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: release-files/*.zip
          body: ${{ steps.changelog.outputs.body }}
