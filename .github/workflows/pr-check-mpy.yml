name: PR Check – MicroPython native modules

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'include/**'
      - 'micropython/**'
      - '.github/workflows/build-mpy.yml'
      - '.github/workflows/pr-check-mpy.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armv6m
            target: rp2040
          - arch: xtensawin
            target: esp32
    uses: ./.github/workflows/build-mpy.yml
    with:
      arch: ${{ matrix.arch }}
      target: ${{ matrix.target }}
      retention_days: 1

  summary:
    name: MicroPython Build Summary
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## MicroPython native module (.mpy) build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | ARCH | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| RP2040 | armv6m | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ESP32 / S2 / S3 | xtensawin | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts retained for 24 hours." >> "$GITHUB_STEP_SUMMARY"
