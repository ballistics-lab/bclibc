name: Build bclibc Libraries

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug
      platforms:
        description: "Platforms to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
      upload_artifacts:
        description: "Upload artifacts"
        required: true
        default: true
        type: boolean

jobs:
  build-linux-x86_64:
    if: inputs.platforms == 'all' || inputs.platforms == 'linux'
    uses: ./.github/workflows/build-lib.yml
    with:
      os: ubuntu-latest
      arch: x86_64
      build_type: ${{ inputs.build_type }}
      retention_days: 7
      upload_artifact: ${{ inputs.upload_artifacts }}

  build-linux-arm64:
    if: inputs.platforms == 'all' || inputs.platforms == 'linux'
    uses: ./.github/workflows/build-lib.yml
    with:
      os: ubuntu-24.04-arm
      arch: arm64
      build_type: ${{ inputs.build_type }}
      retention_days: 7
      upload_artifact: ${{ inputs.upload_artifacts }}

  build-macos:
    if: inputs.platforms == 'all' || inputs.platforms == 'macos'
    uses: ./.github/workflows/build-lib.yml
    with:
      os: macos-latest
      arch: universal
      build_type: ${{ inputs.build_type }}
      retention_days: 7
      upload_artifact: ${{ inputs.upload_artifacts }}

  build-windows-x86_64:
    if: inputs.platforms == 'all' || inputs.platforms == 'windows'
    uses: ./.github/workflows/build-lib.yml
    with:
      os: windows-latest
      arch: x86_64
      build_type: ${{ inputs.build_type }}
      retention_days: 7
      upload_artifact: ${{ inputs.upload_artifacts }}

  build-windows-arm64:
    if: inputs.platforms == 'all' || inputs.platforms == 'windows'
    uses: ./.github/workflows/build-lib.yml
    with:
      os: windows-latest
      arch: arm64
      build_type: ${{ inputs.build_type }}
      retention_days: 7
      upload_artifact: ${{ inputs.upload_artifacts }}

  create-release:
    name: Create Release Package
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86_64
      - build-linux-arm64
      - build-macos
      - build-windows-x86_64
      - build-windows-arm64
    if: always() && inputs.upload_artifacts == true

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release package
        run: |
          mkdir -p release-package
          for platform_dir in artifacts/*/; do
            platform=$(basename "$platform_dir")
            mkdir -p "release-package/$platform"
            cp -r "$platform_dir"* "release-package/$platform/"
          done

          VERSION_FILE=$(find artifacts -name "version.h" -type f | head -1)
          if [ -n "$VERSION_FILE" ]; then
            VERSION=$(grep 'BCLIBC_VERSION' "$VERSION_FILE" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          fi

          cd release-package
          zip -r "../bclibc-${{ inputs.build_type }}.zip" .

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: bclibc-${{ inputs.build_type }}-all-platforms
          path: bclibc-${{ inputs.build_type }}.zip
          retention-days: 30
          if-no-files-found: error
