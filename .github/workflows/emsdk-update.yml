name: EMSDK Update Check
run-name: "EMSDK Update Check — ${{ inputs.emsdk-version || 'auto' }}"

on:
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      emsdk-version:
        description: "emsdk version to pin (e.g. 6.0.5). Leave empty to auto-detect latest."
        required: false
        default: ""
      force:
        description: "Force a PR even if the pinned version already matches."
        type: boolean
        required: false
        default: false

concurrency:
  group: emsdk-update
  cancel-in-progress: true

jobs:
  update:
    name: Check emsdk & patch build_wasm.sh
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # ── Resolve target emsdk version ─────────────────────────────────────
      - name: Resolve emsdk version
        id: emsdk
        env:
          INPUT_VERSION: ${{ inputs.emsdk-version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            echo "source=manual" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(gh api repos/emscripten-core/emsdk/tags --jq '.[].name' --paginate \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -1)
            echo "source=auto" >> "$GITHUB_OUTPUT"
          fi
          CURRENT=$(grep -oP '^EMSDK_VERSION="\K[0-9]+\.[0-9]+\.[0-9]+' build_wasm.sh)
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT"   >> "$GITHUB_OUTPUT"
          echo "Pinned: $CURRENT — latest: $VERSION"

      # ── Skip if already up to date, unless forced or a PR is open ───────
      - name: Check whether an update is needed
        id: check
        env:
          VERSION:  ${{ steps.emsdk.outputs.version }}
          CURRENT:  ${{ steps.emsdk.outputs.current }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="emsdk-update/${VERSION}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.force }}" != "true" ] && [ "$VERSION" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "build_wasm.sh already pins emsdk $CURRENT — nothing to do."
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          OPEN_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null)
          echo "open_pr=${OPEN_PR}" >> "$GITHUB_OUTPUT"
          if [ -n "$OPEN_PR" ]; then
            echo "PR #${OPEN_PR} already open — will update it."
          else
            echo "No open PR — will create one."
          fi

      # ── Patch the pinned version ─────────────────────────────────────────
      - name: Patch build_wasm.sh
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.emsdk.outputs.version }}
        run: |
          sed -i "s/^EMSDK_VERSION=\"[0-9]\+\.[0-9]\+\.[0-9]\+\"/EMSDK_VERSION=\"${VERSION}\"/" build_wasm.sh
          grep '^EMSDK_VERSION=' build_wasm.sh

      # ── Validate: the pinned version must actually build ────────────────
      - name: Build with the new emsdk version
        if: steps.check.outputs.skip == 'false'
        run: |
          chmod +x build_wasm.sh
          ./build_wasm.sh
          test -f build/web/bclibc_ffi.js
          test -f build/web/bclibc_ffi.wasm

      # ── Commit & update/open PR ──────────────────────────────────────────
      - name: Commit and update/open PR
        if: steps.check.outputs.skip == 'false'
        env:
          VERSION:  ${{ steps.emsdk.outputs.version }}
          CURRENT:  ${{ steps.emsdk.outputs.current }}
          SOURCE:   ${{ steps.emsdk.outputs.source }}
          BRANCH:   ${{ steps.check.outputs.branch }}
          OPEN_PR:  ${{ steps.check.outputs.open_pr }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add build_wasm.sh
          git commit -m "chore: bump pinned emsdk to ${VERSION}"
          FORCE_FLAG=""
          [ "${{ inputs.force }}" = "true" ] || [ -n "$OPEN_PR" ] && FORCE_FLAG="--force"
          git push $FORCE_FLAG origin "$BRANCH"

          gh label create "automated" --color "#0075ca" --force || true
          gh label create "emsdk"     --color "#654FF0" --force || true

          BODY_FILE=$(mktemp)
          printf 'Automated update: bumps the pinned emsdk version in `build_wasm.sh` from `%s` to `%s`.\n\nGenerated by the *EMSDK Update Check* workflow (trigger: `%s`).\n\n`./build_wasm.sh` was run against %s in this workflow to confirm the build still succeeds before opening this PR — see the "Build with the new emsdk version" step.\n\nCheck the [emsdk changelog](https://github.com/emscripten-core/emsdk/releases/tag/%s) before merging; this repo has previously had to pin around emsdk regressions (see the note at the top of `build_wasm.sh`).\n' \
            "$CURRENT" "$VERSION" "$SOURCE" "$VERSION" "$VERSION" > "$BODY_FILE"

          if [ -n "$OPEN_PR" ]; then
            gh pr edit "$OPEN_PR" \
              --title "chore: bump pinned emsdk to ${VERSION}" \
              --body-file "$BODY_FILE"
            echo "Updated existing PR #${OPEN_PR}"
          else
            gh pr create \
              --title "chore: bump pinned emsdk to ${VERSION}" \
              --body-file "$BODY_FILE" \
              --label "automated" \
              --label "emsdk" \
              --base main \
              --head "$BRANCH"
          fi
