name: PR Check

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            build_type: Debug
          - os: ubuntu-latest
            arch: x86_64
            build_type: Release
          - os: macos-latest
            arch: arm64
            build_type: Debug
          - os: macos-latest
            arch: arm64
            build_type: Release
          - os: windows-latest
            arch: x86_64
            build_type: Debug
          - os: windows-latest
            arch: x86_64
            build_type: Release
    uses: ./.github/workflows/build-lib.yml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build_type: ${{ matrix.build_type }}
      retention_days: 1

  pre-commit:
    name: Pre-commit Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run pre-commit check
        run: |
          chmod +x pre-commit-check.sh
          ./pre-commit-check.sh || true

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Arch | Build Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | x86_64 | Debug   | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | x86_64 | Release | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS    | arm64  | Debug   | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS    | arm64  | Release | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | x86_64 | Debug   | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | x86_64 | Release | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts available for 24 hours." >> $GITHUB_STEP_SUMMARY
